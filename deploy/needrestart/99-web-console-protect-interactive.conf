# Protect interactive browser terminal sessions from unattended-upgrades.
#
# needrestart runs automatically after apt upgrades on Ubuntu and may restart
# services that have old libraries mapped. For Web Console, web-console-pty is
# not a stateless daemon: it owns live node-pty shells and Claude Code sessions.
# Restarting it destroys active work.
$nrconf{override_rc}->{qr(^web-console-pty\.service$)} = 0;
$nrconf{override_rc}->{qr(^web-console-ws\.service$)} = 0;

1;
