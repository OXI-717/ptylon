name: ghcr-image

# Publish the runtime image to ghcr on every main push, so autopilot hosts
# pull a prebuilt image instead of building locally (weak 2-core / 4GB VMs:
# a local build once OOM'd the host — OXI-717/oxi-skills#1018, wave 2).
# linux/amd64 only by decision 2026-07-20: every prod host is amd64; the arm64
# build is needed only locally on a Mac for verify and never ships.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/oxi-717/ptylon:latest
            ghcr.io/oxi-717/ptylon:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
