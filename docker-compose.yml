name: ${COMPOSE_PROJECT_NAME:-ptylon}

services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: ptylon:local
    restart: unless-stopped
    mem_limit: ${PTYLON_MEM_APP:-0}
    oom_score_adj: ${PTYLON_OOM_ADJ:-0}
    environment:
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      WEB_CONSOLE_ADMIN_TOKEN: ${WEB_CONSOLE_ADMIN_TOKEN:?set WEB_CONSOLE_ADMIN_TOKEN in .env}
      ENGINES: ${ENGINES:-codex}
      HOSTNAME: 0.0.0.0
      ADMIN_ALLOW_REMOTE: ${ADMIN_ALLOW_REMOTE:-0}
      PORT: 8790
      WS_PORT: 8791
      NEXT_PUBLIC_WS_PORT: 8791
      NEXT_PUBLIC_APP_LABEL: Ptylon
      WEB_CONSOLE_ADMIN_WS_URL: ws://ws:8791
    ports:
      - "${PTYLON_APP_BIND:-127.0.0.1}:${PTYLON_APP_PORT:-8790}:8790"
    volumes:
      - ptylon-data:/data
      - ptylon-workspace:/workspace
    depends_on:
      pty:
        condition: service_healthy
      ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8790/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks: [edge, ptylon]

  ws:
    image: ptylon:local
    pull_policy: never
    restart: unless-stopped
    mem_limit: ${PTYLON_MEM_WS:-0}
    oom_score_adj: ${PTYLON_OOM_ADJ:-0}
    command: ["node", "server/ws-server.mjs"]
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      WS_HOST: 0.0.0.0
      WS_PORT: 8791
      PTY_DAEMON_URL: ws://pty:8792
    ports:
      - "${PTYLON_WS_BIND:-127.0.0.1}:${PTYLON_WS_PORT:-8791}:8791"
    depends_on:
      pty:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8791, '127.0.0.1').on('connect', () => process.exit(0)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [edge, ptylon]

  pty:
    # PTY sessions stay isolated from app/ws on ptylon; outbound engine egress uses a separate bridge network.
    image: ptylon:local
    pull_policy: never
    restart: unless-stopped
    mem_limit: ${PTYLON_MEM_PTY:-0}
    oom_score_adj: ${PTYLON_OOM_ADJ:-0}
    command: ["node", "server/pty-daemon.mjs"]
    environment:
      PTY_DAEMON_HOST: 0.0.0.0
      PTY_DAEMON_PORT: 8792
      PTY_DAEMON_ALLOW_NETWORK: "true"
      WORKSPACE_ROOT: /workspace
      PTY_IDLE_TIMEOUT_HOURS: ${PTY_IDLE_TIMEOUT_HOURS:-168}
      ENGINES: ${ENGINES:-codex}
      INSTALL_ENGINES: ${INSTALL_ENGINES:-0}
    volumes:
      - ptylon-workspace:/workspace
      - ${PTYLON_CODEX_HOME:-/opt/ptylon/seats/codex-home}:/home/ptylon/.codex
      - ${PTYLON_CLAUDE_HOME:-/opt/ptylon/seats/claude-home}:/home/ptylon/.claude
      - ${PTYLON_CLAUDE_JSON:-/opt/ptylon/seats/claude-home/.claude.json}:/home/ptylon/.claude.json
      - ${PTYLON_OPENCODE_HOME:-/opt/ptylon/seats/opencode-home}:/home/ptylon/.local
      - ${PTYLON_AGY_HOME:-/opt/ptylon/seats/agy-home}:/home/ptylon/.gemini
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8792, '127.0.0.1').on('connect', () => process.exit(0)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [ptylon, egress]

volumes:
  ptylon-data:
  ptylon-workspace:

networks:
  edge:
  ptylon:
    internal: true
  egress:
